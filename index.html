<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Limited Drops 🔥</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0a0a0a;
color:#e5e5e5;
font-family:'Inter',sans-serif;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;
background:#0a0a0a;
border-bottom:1px solid #222;
}

.logo{
font-family:'Cinzel',serif;
font-size:22px;
letter-spacing:4px;
}

nav ul{
display:flex;
list-style:none;
gap:35px;
}

nav a{
text-decoration:none;
color:#ccc;
font-size:13px;
letter-spacing:2px;
transition:0.3s;
}

nav a:hover{
color:white;
}

/* HERO */

.hero{
height:85vh;
background:url("banner.png") center/cover no-repeat;
display:flex;
align-items:flex-end;
justify-content:center;
text-align:center;
}

.hero h1{
font-family:'Cinzel',serif;
font-size:64px;
letter-spacing:8px;
background:rgba(0,0,0,0.5);
padding:30px 50px;
}

/* PRODUCTS */

.products{
padding:100px 10%;
}

.products h2{
font-family:'Cinzel',serif;
font-size:30px;
margin-bottom:50px;
letter-spacing:3px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:40px;
}

.product{
background:#111;
padding:15px;
border:1px solid #222;
transition:0.35s;
cursor:pointer;
}

.product:hover{
border:1px solid #555;
transform:translateY(-6px);
}

.product img{
width:100%;
height:320px;
object-fit:cover;
}

.product h3{
margin-top:15px;
font-size:15px;
letter-spacing:2px;
}

.price{
color:#888;
margin-top:5px;
}

/* PRODUCT VIEW */

.product-view{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0a0a0a;
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.view-container{
display:flex;
gap:80px;
width:80%;
max-width:1200px;
animation:fadeIn 0.4s ease;
}

.view-image{
overflow:hidden;
}

.view-image img{
width:500px;
transition:transform 0.4s ease;
}

.view-image:hover img{
transform:scale(1.1);
}

.gallery{
display:flex;
gap:10px;
margin-top:15px;
}

.gallery img{
width:60px;
border:1px solid #333;
cursor:pointer;
}

.gallery img:hover{
border:1px solid #aaa;
}

.view-info{
max-width:400px;
}

.view-info h1{
font-family:'Cinzel',serif;
letter-spacing:3px;
margin-bottom:10px;
}

.add-btn{
margin:20px 0;
padding:14px 30px;
background:none;
border:1px solid #aaa;
color:#eee;
letter-spacing:2px;
cursor:pointer;
transition:0.3s;
}

.add-btn:hover{
border:1px solid white;
}

.close{
position:absolute;
top:40px;
right:60px;
font-size:30px;
cursor:pointer;
color:#999;
}

.close:hover{
color:white;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* FOOTER */

footer{
margin-top:120px;
padding:40px;
text-align:center;
border-top:1px solid #222;
font-size:13px;
color:#666;
}

</style>
</head>

<body>

<nav>

<div class="logo">Akuto.</div>

<ul>
<li><a href="#">SHOP</a></li>
<li><a href="#">COLLECTION</a></li>
<li><a href="#">LOOKBOOK</a></li>
<li><a href="#">CONTACT</a></li>
</ul>

</nav>

<section class="hero">
<h1>DARK COLLECTION</h1>
</section>

<section class="products">

<h2>FEATURED</h2>

<div class="grid">

<div class="product" onclick="openView(['Mockup.png'],'GOTHIC CROSS HOODIE','$180')">
<img src="Mockup.png">
<h3>GOTHIC CROSS HOODIE</h3>
<p class="price">$180</p>
</div>

<div class="product" onclick="openView(['skater.png'],'BLACK DAGGER TEE','$95')">
<img src="skater.png">
<h3>BLACK DAGGER TEE</h3>
<p class="price">$95</p>
</div>

</div>

</section>

<footer>
© 2026 NOIR ATELIER
</footer>

<!-- PRODUCT VIEW -->

<div id="product-view" class="product-view">

<div class="view-container">

<div class="view-image">

<img id="main-img">

<div class="gallery" id="gallery"></div>

</div>

<div class="view-info">

<h1 id="view-title"></h1>
<p class="price" id="view-price"></p>

<button class="add-btn">ADD TO BAG</button>

<h3>DETAILS —</h3>

<ul>
<li>Premium heavyweight cotton</li>
<li>Skate culture inspired</li>
<li>Limited drop</li>
<li>Relaxed oversized fit</li>
</ul>

</div>

<span class="close" onclick="closeView()">✕</span>

</div>

</div>

<script>

function openView(images,title,price){

document.getElementById("product-view").style.display="flex"

document.getElementById("view-title").innerText=title
document.getElementById("view-price").innerText=price

document.getElementById("main-img").src=images[0]

let gallery=document.getElementById("gallery")
gallery.innerHTML=""

images.forEach(img=>{

let thumb=document.createElement("img")
thumb.src=img

thumb.onclick=()=>{
document.getElementById("main-img").src=img
}

gallery.appendChild(thumb)

})

}

function closeView(){
document.getElementById("product-view").style.display="none"
}

</script>

</body>
</html>
